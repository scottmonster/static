<!doctype html>
<html lang="en">
<head>

	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Got`em</title>
	<style>
		html, body {
			background-color: black;
		}

		body {
			margin: 0;
			min-height: 100vh;
		}

		img {
			display: block;
			width: 100vw;
			height: 100vh;
			object-fit: contain;
			object-position: center;
		}
	</style>
</head>
<body>
	<img id="random-gif" alt="Random GIF">
	<script>
		const assetBaseUrl = new URL('../assets/', location.href);
		const filenames = [
'bamboozled.gif',
'dumb-youre-really-dumb.gif',
'fool-you-fool.gif',
'gordon-ramsay-idiot-sandwich.gif',

'hes-a-fraud-joe-biden.gif',
'hes-a-liar-liar.gif',
'hes-a-liar-upset.gif',
'hes-full-of-shit-ralph-macchio.gif',
'it-was-all-a-lie-lie.gif',
'kevinmcgarry-mcgarries.gif',
'rickroll-roll.gif',
'tricked-deceived.gif',
'wedding-crashers-will-ferrell.gif',
'we-got-em.gif',
'you-tricked-me-gabby.gif'
		];

		const selectedUrl = new URL(
			filenames[Math.floor(Math.random() * filenames.length)],

</body>
