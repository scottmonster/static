<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Got`em</title>
	<style>
		html, body {
			background-color: black;
		}

		body {
			margin: 0;
			min-height: 100vh;
		}

		img {
			display: block;
			width: 100vw;
			height: 100vh;
			object-fit: contain;
			object-position: center;
		}
	</style>
</head>
<body>
	<img id="random-gif" alt="Random GIF">
	<script>
		const assetBaseUrl = new URL('../assets/', location.href);
		const filenames = [
'bamboozled.gif',
'dumb-youre-really-dumb.gif',
'gordon-ramsay-idiot-sandwich.gif',
'gotcha-b.gif',
'gotcha-i-got-you.gif',
'hes-a-fraud-joe-biden.gif',
'hes-a-liar-liar.gif',
'hes-a-liar-upset.gif',
'hes-full-of-shit-ralph-macchio.gif',
'it-was-all-a-lie-lie.gif',
'kevinmcgarry-mcgarries.gif',
'rickroll-roll.gif',
'tricked-deceived.gif',
'wedding-crashers-will-ferrell.gif',
'we-got-em.gif',
'you-tricked-me-gabby.gif'
		];

		const storageKey = 'static.pages.base.remaining-gifs.v1';

		function shuffle(items) {
			for (let index = items.length - 1; index > 0; index -= 1) {
				const randomIndex = Math.floor(Math.random() * (index + 1));
				[items[index], items[randomIndex]] = [items[randomIndex], items[index]];
			}

			return items;
		}

		let remainingFilenames = [];

		try {
			const storedFilenames = JSON.parse(localStorage.getItem(storageKey));
			if (Array.isArray(storedFilenames)) {
				remainingFilenames = storedFilenames.filter((filename) => filenames.includes(filename));
			}
		} catch {
			// Use a new cycle when storage is unavailable or contains invalid data.
		}

		if (remainingFilenames.length === 0) {
			remainingFilenames = shuffle([...filenames]);
		}

		const selectedFilename = remainingFilenames.pop();

		try {
			localStorage.setItem(storageKey, JSON.stringify(remainingFilenames));
		} catch {
			// The current selection still works when storage is unavailable.
		}

		const selectedUrl = new URL(selectedFilename, assetBaseUrl);

		document.getElementById('random-gif').src = selectedUrl;
	</script>
</body>
</html>
