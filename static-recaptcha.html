<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Static Human Verification</title>
		<style>
			* {
				box-sizing: border-box;
			}

			body {
				display: grid;
				min-height: 100vh;
				margin: 0;
				place-items: center;
				background: #fff;
				font-family: Roboto, Arial, sans-serif;
			}

			.recaptcha-wrap {
				position: relative;
				width: 302px;
				height: 76px;
        border: #000;
			}

			.verification {
				position: absolute;
				bottom: calc(100% + 0.5rem);
				width: 100%;
				margin: 0;
				color: #000;
				font-size: 15px;
        font-weight: bold;
				line-height: 1.2;
				text-align: center;
				transform: translateX(-0.5rem);
				white-space: nowrap;
			}

			.recaptcha {
				display: flex;
				align-items: center;
				width: 302px;
				height: 76px;
				border: 1px solid #d3d3d3;
				border-radius: 3px;
				background: #f9f9f9;
				box-shadow: 0 0 4px 1px rgb(0 0 0 / 8%);
				color: #000;
			}

			.checkbox {
				width: 28px;
				height: 28px;
				margin-left: 12px;
				border: 2px solid #555;
				background: #fff;
			}

			.label {
				margin-left: 12px;
				font-size: 14px;
			}

			.brand {
				display: grid;
				justify-items: center;
				margin-left: auto;
				margin-right: 12px;
				color: #555;
				font-size: 10px;
				line-height: 1;
			}

			.brand svg {
				width: 32px;
				height: 32px;
				margin-bottom: 1px;
			}
		</style>
	</head>
	<body>


		<div class="recaptcha-wrap">
			<p class="verification">Verifying you are human...</p>
			<div class="recaptcha" role="checkbox" aria-checked="false" aria-label="I'm not a robot">
				<span class="checkbox" aria-hidden="true"></span>
				<span class="label">I'm not a robot</span>
				<span class="brand" aria-hidden="true">
					<svg viewBox="0 0 38 38">
						<path
							fill="#6b90d6"
							d="M19 3a16 16 0 0 1 14.4 9l-4.7 2.2A11 11 0 0 0 9 18H3a16 16 0 0 1 16-15Z"
						/>
						<path fill="#a7a7a7" d="M35 20a16 16 0 0 1-14.4 15v-5.2A11 11 0 0 0 29 20h6Z" />
						<path fill="#f5f5f5" d="m32 8 5 8-9-1Z" />
						<path fill="#f5f5f5" d="m6 30-5-8 9 1Z" />
					</svg>
					<span>reCAPTCHA</span>
				</span>
			</div>
		</div>
	</body>
</html>
