<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Got`em</title>
	<style>
		html, body {
			background-color: black;
		}

		body {
			margin: 0;
			min-height: 100vh;
		}

		#rick-roll-background {
			position: fixed;
      --blur: 18px;
			inset: -24px;
			width: calc(100vw + 48px);
			height: calc(100vh + 48px);
			object-fit: cover;
			filter: blur(18px);
			opacity: 0.45;
			pointer-events: none;
		}

		#rick-roll-background[hidden] {
			display: none;
		}

		#random-gif {
			position: relative;
			z-index: 1;
			display: block;
			width: 100vw;
			height: 100vh;
			object-fit: contain;
			object-position: center;
      
		}
	</style>
</head>
<body>
	<img id="rick-roll-background" alt="" hidden>
	<img id="random-gif" alt="Random GIF">
	<script>
		const assetBaseUrl = new URL('../assets/', location.href);
		const filenames = [
'bamboozled.gif',
'dumb-youre-really-dumb.gif',
'gordon-ramsay-idiot-sandwich.gif',
'gotcha-b.gif',
'gotcha-i-got-you.gif',
'hes-a-fraud-joe-biden.gif',
'hes-a-liar-liar.gif',
'hes-a-liar-upset.gif',
'hes-full-of-shit-ralph-macchio.gif',
'it-was-all-a-lie-lie.gif',
'kevinmcgarry-mcgarries.gif',
'rickroll-roll.gif',
'tricked-deceived.gif',
'wedding-crashers-will-ferrell.gif',
'we-got-em.gif',
'you-tricked-me-gabby.gif'
		];

		const storageKey = 'static.pages.base.remaining-gifs.v1';
		const twoLoopThresholdMs = 4_720;
		const rick_roll_bg = true;
		const rickRollFilename = 'rickroll-roll.gif';

		function readSubBlocks(bytes, offset) {
			while (offset < bytes.length) {
				const blockSize = bytes[offset++];
				if (blockSize === 0) return offset;
				offset += blockSize;
			}

			throw new Error('Unexpected end of GIF data.');
		}

		function getGifLoopDurationMs(bytes) {
			if (
				bytes.length < 13 ||
				String.fromCharCode(...bytes.slice(0, 6)) !== 'GIF87a' &&
				String.fromCharCode(...bytes.slice(0, 6)) !== 'GIF89a'
			) {
				throw new Error('Not a GIF file.');
			}

			let offset = 13;
			let frameDelayMs = 100;
			let loopDurationMs = 0;
			let frameCount = 0;
			const hasGlobalColorTable = (bytes[10] & 0x80) !== 0;

			if (hasGlobalColorTable) {
				offset += 3 * (1 << ((bytes[10] & 0x07) + 1));
			}

			while (offset < bytes.length) {
				const blockType = bytes[offset++];

				if (blockType === 0x3b) break; // Trailer

				if (blockType === 0x21) { // Extension introducer
					const label = bytes[offset++];
					const blockSize = bytes[offset++];

					if (label === 0xf9 && blockSize === 4) { // Graphic Control Extension
						const delayCentiseconds = bytes[offset + 1] | (bytes[offset + 2] << 8);
						frameDelayMs = delayCentiseconds === 0 ? 100 : delayCentiseconds * 10;
						offset += blockSize;
						if (bytes[offset++] !== 0) throw new Error('Invalid graphic control extension.');
					} else {
						offset += blockSize;
						offset = readSubBlocks(bytes, offset);
					}
					continue;
				}

				if (blockType === 0x2c) { // Image descriptor
					offset += 8;
					const packedFields = bytes[offset++];
					if (packedFields & 0x80) {
						offset += 3 * (1 << ((packedFields & 0x07) + 1));
					}
					offset += 1; // LZW minimum code size
					offset = readSubBlocks(bytes, offset);
					loopDurationMs += frameDelayMs;
					frameCount += 1;
					frameDelayMs = 100;
					continue;
				}

				throw new Error('Unrecognized GIF block.');
			}

			if (frameCount === 0) throw new Error('GIF contains no frames.');
			return loopDurationMs;
		}

		async function getGifDurations() {
			const results = await Promise.all(filenames.map(async (filename) => {
				try {
					const url = new URL(filename, assetBaseUrl);
					const response = await fetch(url);
					if (!response.ok) throw new Error(`Request failed with ${response.status}.`);

					const durationMs = getGifLoopDurationMs(new Uint8Array(await response.arrayBuffer()));
					console.log(`${filename}: ${(durationMs / 1000).toFixed(2)}s`);
					return [filename, durationMs];
				} catch (error) {
					console.warn(`Could not determine runtime for ${filename}.`, error);
					return null;
				}
			}));

			return new Map(results.filter(Boolean));
		}

		function getLoopCount(durationMs) {
			return durationMs < twoLoopThresholdMs ? 2 : 1;
		}

		function shuffle(items) {
			for (let index = items.length - 1; index > 0; index -= 1) {
				const randomIndex = Math.floor(Math.random() * (index + 1));
				[items[index], items[randomIndex]] = [items[randomIndex], items[index]];
			}

			return items;
		}

		const image = document.getElementById('random-gif');
		const backgroundImage = document.getElementById('rick-roll-background');

		if (rick_roll_bg) {
			backgroundImage.hidden = false;
			backgroundImage.src = new URL(rickRollFilename, assetBaseUrl);
		}

		async function startPlaylist() {
			const durations = await getGifDurations();
			const playableFilenames = filenames.filter((filename) =>
				durations.has(filename) && (!rick_roll_bg || filename !== rickRollFilename)
			);

			if (playableFilenames.length === 0) {
				console.warn('No GIFs with readable runtimes are available to play.');
				return;
			}

			let remainingFilenames = [];

			try {
				const storedFilenames = JSON.parse(localStorage.getItem(storageKey));
				if (Array.isArray(storedFilenames)) {
					remainingFilenames = storedFilenames.filter((filename) => playableFilenames.includes(filename));
				}
			} catch {
				// Use a new cycle when storage is unavailable or contains invalid data.
			}

			function takeNextFilename() {
				if (remainingFilenames.length === 0) {
					remainingFilenames = shuffle([...playableFilenames]);
				}

				const filename = remainingFilenames.pop();
				try {
					localStorage.setItem(storageKey, JSON.stringify(remainingFilenames));
				} catch {
					// The current selection still works when storage is unavailable.
				}
				return filename;
			}

			function playNextGif() {
				const filename = takeNextFilename();
				const loopDurationMs = durations.get(filename);
				const loopCount = getLoopCount(loopDurationMs);

				console.log(
					`Current GIF — ${filename}: ${(loopDurationMs / 1000).toFixed(2)}s, ${loopCount} loops`
				);

				image.addEventListener('load', () => {
					let completedLoops = 0;

					function startLoop() {
						completedLoops += 1;
						console.count('start');
						window.setTimeout(
							completedLoops === loopCount ? playNextGif : startLoop,
							loopDurationMs
						);
					}

					startLoop();
				}, { once: true });

				image.src = new URL(filename, assetBaseUrl);
			}

			playNextGif();
		}

		startPlaylist();
	</script>
</body>
</html>
