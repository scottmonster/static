<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Got`em</title>
	<style>
		html, body {
			background-color: black;
		}

		body {
			margin: 0;
			min-height: 100vh;
		}

		img {
			display: block;
			width: 100vw;
			height: 100vh;
			object-fit: contain;
			object-position: center;
		}
	</style>
</head>
<body>
	<img id="random-gif" alt="Random GIF">
	<script>
		const assetBaseUrl = new URL('../assets/', location.href);
		const filenames = [
			'bamboozled.gif',
			'gotcha-b.gif',
			'rickroll-roll.gif',
			'tricked-deceived.gif'
		];

		const selectedUrl = new URL(
			filenames[Math.floor(Math.random() * filenames.length)],
			assetBaseUrl
		);

		document.getElementById('random-gif').src = selectedUrl;
	</script>
</body>
</html>
